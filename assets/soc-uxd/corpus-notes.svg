<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="410" viewBox="0 0 1180 410" role="img" aria-labelledby="title desc">
  <title id="title">历史经验语料笔记</title>
  <desc id="desc">展示历史 Figma 文档如何沉淀为功能域、页面模式、组件规范和新设计检查点。</desc>
  <defs><style>.bg{fill:#f7f9fc}.card{fill:#fff;stroke:#d8e0ec;stroke-width:1.5}.head{font:700 24px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}.label{font:700 15px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}.text{font:13px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#4b5563}.tag{font:12px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#2563eb}.arrow{fill:none;stroke:#7c8aa5;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}.a{fill:#e8f0ff;stroke:#98b4f4}.b{fill:#ecfdf5;stroke:#74c69d}.c{fill:#fff7ed;stroke:#f4a261}.d{fill:#f3e8ff;stroke:#c4b5fd}</style><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#7c8aa5"/></marker></defs>
  <rect class="bg" width="1180" height="410" rx="18"/>
  <text class="head" x="42" y="52">语料笔记：把历史 Figma 经验变成可查模式</text>
  <text class="text" x="42" y="82">先找功能域，再找页面模式，最后回到组件和规范确认。</text>
  <g transform="translate(58 132)"><rect class="card a" width="190" height="152" rx="14"/><text class="label" x="24" y="36">历史文档</text><text class="text" x="24" y="74">Figma 案例</text><text class="text" x="24" y="102">项目复盘</text><text class="text" x="24" y="130">双端经验</text></g>
  <path class="arrow" d="M258 208 H320" marker-end="url(#arrow)"/>
  <g transform="translate(332 132)"><rect class="card b" width="190" height="152" rx="14"/><text class="label" x="24" y="36">功能域</text><text class="text" x="24" y="74">制造 / 背包</text><text class="text" x="24" y="102">好友 / 队伍</text><text class="text" x="24" y="130">公会 / 赛季</text></g>
  <path class="arrow" d="M532 208 H594" marker-end="url(#arrow)"/>
  <g transform="translate(606 132)"><rect class="card c" width="190" height="152" rx="14"/><text class="label" x="24" y="36">页面模式</text><text class="text" x="24" y="74">入口 / 列表</text><text class="text" x="24" y="102">选择 / 确认</text><text class="text" x="24" y="130">队列 / 反馈</text></g>
  <path class="arrow" d="M806 208 H868" marker-end="url(#arrow)"/>
  <g transform="translate(880 132)"><rect class="card d" width="220" height="152" rx="14"/><text class="label" x="24" y="36">新设计检查</text><text class="text" x="24" y="74">可复用模式</text><text class="text" x="24" y="102">待确认差异</text><text class="text" x="24" y="130">组件和规范回查</text></g>
  <text class="tag" x="58" y="326">语料笔记提供路径，不替代正式规范和当前策划输入。</text>
</svg>
