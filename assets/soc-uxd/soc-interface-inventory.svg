<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="410" viewBox="0 0 1180 410" role="img" aria-labelledby="title desc">
  <title id="title">全量界面资产库</title>
  <desc id="desc">展示系统大类、系统、手游图示、PC 图示和界面分析如何组成全量界面资产库。</desc>
  <defs><style>.bg{fill:#f7f9fc}.card{fill:#fff;stroke:#d8e0ec;stroke-width:1.5}.head{font:700 24px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}.label{font:700 15px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}.text{font:13px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#4b5563}.tag{font:12px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#2563eb}.arrow{fill:none;stroke:#7c8aa5;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}.a{fill:#e8f0ff;stroke:#98b4f4}.b{fill:#ecfdf5;stroke:#74c69d}.c{fill:#fff7ed;stroke:#f4a261}.d{fill:#f3e8ff;stroke:#c4b5fd}</style><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#7c8aa5"/></marker></defs>
  <rect class="bg" width="1180" height="410" rx="18"/>
  <text class="head" x="42" y="52">全量界面资产库：按系统定位历史界面</text>
  <text class="text" x="42" y="82">先定位系统，再读框架、状态、跳转和 PC 差异。</text>
  <g transform="translate(58 132)"><rect class="card a" width="190" height="152" rx="14"/><text class="label" x="24" y="36">系统归档</text><text class="text" x="24" y="74">系统大类</text><text class="text" x="24" y="102">具体系统</text><text class="text" x="24" y="130">业务域</text></g>
  <path class="arrow" d="M258 208 H320" marker-end="url(#arrow)"/>
  <g transform="translate(332 132)"><rect class="card b" width="190" height="152" rx="14"/><text class="label" x="24" y="36">双端图示</text><text class="text" x="24" y="74">手游图示</text><text class="text" x="24" y="102">PC 图示</text><text class="text" x="24" y="130">待补节点</text></g>
  <path class="arrow" d="M532 208 H594" marker-end="url(#arrow)"/>
  <g transform="translate(606 132)"><rect class="card c" width="190" height="152" rx="14"/><text class="label" x="24" y="36">界面分析</text><text class="text" x="24" y="74">框架</text><text class="text" x="24" y="102">元素状态</text><text class="text" x="24" y="130">跳转逻辑</text></g>
  <path class="arrow" d="M806 208 H868" marker-end="url(#arrow)"/>
  <g transform="translate(880 132)"><rect class="card d" width="220" height="152" rx="14"/><text class="label" x="24" y="36">设计使用</text><text class="text" x="24" y="74">找历史依据</text><text class="text" x="24" y="102">判断 PC 定制</text><text class="text" x="24" y="130">回源确认</text></g>
  <text class="tag" x="58" y="326">待确认行不能写成确定规则，需要回到源表、Figma 或负责人。</text>
</svg>
